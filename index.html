<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zci8</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: radial-gradient(circle, #1a0000, black);
}

.container {
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: rgba(10,0,0,0.6);
  box-shadow: 0 0 30px red;
}

/* buttons */
button {
  padding: 12px 18px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid red;
  background: rgba(40,0,0,0.6);
  color: white;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 20px red;
}

/* slider */
input[type="range"] {
  width: 200px;
  margin-top: 10px;
}

/* hidden player */
#iframeWrap {
  position: absolute;
  width: 0;
  height: 0;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <h2>@zci8 Music Control</h2>

  <button onclick="playMusic()">▶ Play</button>
  <button onclick="pauseMusic()">⏸ Pause</button>

  <br>

  🔊 Volume
  <br>
  <input type="range" min="0" max="100" value="50" onchange="setVolume(this.value)">

</div>

<!-- hidden youtube -->
<div id="iframeWrap">
  <iframe id="yt"
    width="0"
    height="0"
    src=""
    allow="autoplay; encrypted-media">
  </iframe>
</div>

<script>
let started = false;

function loadPlayer() {
  const yt = document.getElementById("yt");

  yt.src =
    "https://www.youtube.com/embed/7aMOurgDB-o" +
    "?enablejsapi=1&autoplay=1&loop=1&playlist=7aMOurgDB-o";

  started = true;
}

function playMusic() {
  if (!started) loadPlayer();
  else ytCommand("playVideo");
}

function pauseMusic() {
  ytCommand("pauseVideo");
}

function setVolume(val) {
  const yt = document.getElementById("yt");
  yt.contentWindow.postMessage(
    '{"event":"command","func":"setVolume","args":[' + val + ']}',
    "*"
  );
}

function ytCommand(action) {
  const yt = document.getElementById("yt");
  yt.contentWindow.postMessage(
    JSON.stringify({
      event: "command",
      func: action,
      args: []
    }),
    "*"
  );
}
</script>

</body>
</html>

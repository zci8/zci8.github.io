<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zci8</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: black;
}

/* 🔴 glitch background layers */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #1a0000, #000);
  animation: pulse 6s infinite alternate;
  z-index: -3;
}

@keyframes pulse {
  0% { filter: brightness(0.8); }
  100% { filter: brightness(1.4); }
}

/* ⚡ glitch scan lines */
.scanlines {
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.05),
    rgba(0,0,0,0.1) 2px,
    transparent 4px
  );
  z-index: -2;
  animation: flicker 0.2s infinite;
}

@keyframes flicker {
  0% { opacity: 0.9; }
  50% { opacity: 0.6; }
  100% { opacity: 0.9; }
}

/* 🩸 floating particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: red;
  border-radius: 50%;
  opacity: 0.5;
  animation: float 8s infinite linear;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* main card */
.container {
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: rgba(10,0,0,0.6);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(255,0,0,0.3);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.profile-pic {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid red;
  box-shadow: 0 0 20px red;
}

h1 {
  margin-top: 10px;
  color: #ff2a2a;
  text-shadow: 0 0 10px red;
}

.link, .copy-box {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 260px;
  border-radius: 12px;
  background: rgba(50,0,0,0.6);
  border: 1px solid red;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.link:hover, .copy-box:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

.counter {
  margin-top: 10px;
  opacity: 0.8;
  font-size: 14px;
}

/* copied popup */
.copied {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
}

.copied.show {
  animation: pop 1s forwards;
}

@keyframes pop {
  0% { opacity: 0; transform: translate(-50%,20px); }
  20% { opacity: 1; transform: translate(-50%,0); }
  100% { opacity: 0; }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>

<div class="container">

  <img class="profile-pic" src="pfp.jpg">
  <h1>@zci8</h1>

  <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
  <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord</a>

  <div class="copy-box" onclick="copyText()">
    🎮 Ubisoft Connect: zci8
  </div>

  <div class="counter">👀 Views: live tracking enabled</div>

</div>

<div id="copied" class="copied">Copied!</div>

<script>
function copyText() {
  navigator.clipboard.writeText('zci8');

  const popup = document.getElementById('copied');
  popup.classList.remove('show');
  void popup.offsetWidth;
  popup.classList.add('show');
}

/* floating particles */
for (let i = 0; i < 25; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (4 + Math.random() * 6) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>

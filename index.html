<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>zci8</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* LIGHT PURPLE BACKGROUND */
body {
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #d8b4fe, #a855f7, #2a003f);
  overflow: hidden;
}

/* soft animated glow */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 60%);
  animation: pulse 6s infinite alternate;
  z-index: -1;
}

@keyframes pulse {
  from { transform: scale(1); opacity: 0.6; }
  to { transform: scale(1.2); opacity: 1; }
}

/* MAIN */
.container {
  text-align: center;
  padding: 25px;
  border-radius: 20px;
  background: rgba(30,0,0,0.85);
  box-shadow: 0 0 30px red;
  animation: fadeIn 1s ease;

  width: 90%;
  max-width: 320px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* PROFILE */
.profile-pic {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid red;
  box-shadow: 0 0 20px red;
  object-fit: cover;
}

h1 {
  margin-top: 10px;
  color: #ff2a2a;
  text-shadow: 0 0 10px red;
}

/* LINKS */
.link, .copy-box {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 100%;
  border-radius: 12px;
  background: rgba(60,0,0,0.8);
  border: 1px solid red;
  color: white;
  cursor: pointer;
  text-decoration: none;
  transition: 0.2s;
}

.link:hover, .copy-box:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* COPIED POPUP */
.copied {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
}

.copied.show {
  animation: pop 1s forwards;
}

@keyframes pop {
  0% { opacity: 0; transform: translate(-50%,20px); }
  20% { opacity: 1; transform: translate(-50%,0); }
  100% { opacity: 0; }
}

/* footer */
.footer {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <img class="profile-pic" src="pfp.jpg">
  <h1>@zci8</h1>

  <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
  <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord</a>

  <div class="copy-box" onclick="copyText()">
    🎮 Ubisoft Connect: zci8
  </div>

  <div class="footer">made by zci8</div>

</div>

<div id="copied" class="copied">Copied!</div>

<script>
function copyText() {
  navigator.clipboard.writeText('zci8');

  const popup = document.getElementById('copied');
  popup.classList.remove('show');
  void popup.offsetWidth;
  popup.classList.add('show');
}
</script>

</body>
</html>

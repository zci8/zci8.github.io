<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zci8</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a0000, black);
  cursor: pointer;
}

/* MAIN CARD */
.container {
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: rgba(10,0,0,0.6);
  box-shadow: 0 0 30px red;
  max-width: 320px;
}

/* PROFILE */
.profile-pic {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid red;
  box-shadow: 0 0 20px red;
  object-fit: cover;
}

h1 {
  margin-top: 10px;
  color: #ff2a2a;
  text-shadow: 0 0 10px red;
}

/* LINKS */
.link {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 260px;
  border-radius: 12px;
  background: rgba(40,0,0,0.6);
  border: 1px solid red;
  color: white;
  text-decoration: none;
  transition: 0.2s;
}

.link:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* MUSIC PANEL */
.music-panel {
  margin-top: 15px;
  padding: 12px;
  border: 1px solid red;
  border-radius: 12px;
  background: rgba(30,0,0,0.5);
}

.music-btn {
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid red;
  background: rgba(20,0,0,0.7);
  color: white;
  cursor: pointer;
  margin-bottom: 10px;
  width: 100%;
}

.music-btn:hover {
  box-shadow: 0 0 15px red;
}

/* VOLUME SLIDER */
input[type="range"] {
  width: 100%;
  accent-color: red;
  margin-top: 8px;
}

.small {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <img class="profile-pic" src="pfp.jpg" alt="pfp">
  <h1>@zci8</h1>

  <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
  <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord</a>

  <div class="link">🎮 Ubisoft Connect: zci8</div>

  <!-- MUSIC CONTROLS -->
  <div class="music-panel">

    <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
      ▶ Play Music
    </button>

    <label>Volume</label>
    <input type="range" min="0" max="100" value="100" id="volumeSlider">

  </div>

  <div class="small">click anywhere once to enable audio</div>

</div>

<!-- AUDIO -->
<audio id="music" loop preload="auto">
  <source src="./music.mp3" type="audio/mpeg">
</audio>

<script>
let playing = false;
let unlocked = false;

const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");
const volumeSlider = document.getElementById("volumeSlider");

/* SET INITIAL VOLUME */
music.volume = 1.0;

/* CLICK ANYWHERE UNLOCK + AUTO START */
document.addEventListener("click", () => {
  if (!unlocked) {
    music.play().then(() => {
      music.pause();
      music.currentTime = 0;
      unlocked = true;
    }).catch(() => {});
  }
});

/* PLAY / PAUSE BUTTON */
function toggleMusic() {
  if (!playing) {
    music.play().then(() => {
      playing = true;
      btn.innerText = "⏸ Pause Music";
    });
  } else {
    music.pause();
    playing = false;
    btn.innerText = "▶ Play Music";
  }
}

/* VOLUME CONTROL */
volumeSlider.addEventListener("input", () => {
  music.volume = volumeSlider.value / 100;
});
</script>

</body>
</html>

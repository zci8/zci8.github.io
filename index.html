<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>zci8</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      font-family: Arial, sans-serif;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(-45deg,#0a001a,#1a0033,#000,#2a0055);
      background-size:400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .container {
      text-align:center;
      padding:30px;
      border-radius:20px;
      background: rgba(20,0,40,0.35);
      backdrop-filter: blur(10px);
      box-shadow:0 0 25px rgba(168,85,247,0.4);
    }

    .profile-pic {
      width:110px;
      height:110px;
      border-radius:50%;
      border:3px solid #a855f7;
      box-shadow:0 0 20px #a855f7;
      margin-bottom:10px;
    }

    h1 {
      font-size:32px;
      color:#c084fc;
      text-shadow:0 0 10px #a855f7;
      margin-bottom:20px;
    }

    .link, .copy-box {
      display:block;
      margin:12px auto;
      padding:14px;
      width:260px;
      border-radius:14px;
      background:rgba(40,0,70,0.6);
      border:1px solid rgba(168,85,247,0.6);
      color:white;
      text-decoration:none;
      transition:.25s;
      cursor:pointer;
    }

    .link:hover, .copy-box:hover {
      transform:scale(1.06);
      box-shadow:0 0 20px #a855f7;
    }

    .copied {
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      background:#a855f7;
      padding:10px 20px;
      border-radius:10px;
      opacity:0;
    }

    .copied.show {
      animation: pop 1.2s forwards;
    }

    @keyframes pop {
      0%{opacity:0; transform:translate(-50%,20px);}
      20%{opacity:1; transform:translate(-50%,0);}
      100%{opacity:0;}
    }

    .footer {
      margin-top:10px;
      font-size:12px;
      opacity:0.6;
    }
  </style>
</head>

<body>

<div class="container">

  <img class="profile-pic" src="pfp.jpg">

  <h1>@zci8</h1>

  <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
  <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord Server</a>

  <div class="copy-box" onclick="copyText()">
    🎮 Ubisoft Connect: zci8
  </div>

  <div class="footer">👀 Unique visitors tracked</div>
  <div class="footer">made by zci8</div>

</div>

<div id="copied" class="copied">Copied!</div>

<script>
function copyText() {
  navigator.clipboard.writeText('zci8');
  const popup = document.getElementById('copied');
  popup.classList.remove('show');
  void popup.offsetWidth;
  popup.classList.add('show');
}
</script>

<!-- UNIQUE VISITOR TRACKING -->
<script data-goatcounter="https://zci8.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>

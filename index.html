<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>zci8</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      font-family:Arial;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(-45deg,#0a001a,#1a0033,#000,#2a0055);
      background-size:400% 400%;
      animation: bg 10s ease infinite;
    }

    @keyframes bg {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .container {
      text-align:center;
      padding:30px;
      border-radius:20px;
      background:rgba(20,0,40,0.35);
      backdrop-filter:blur(10px);
      box-shadow:0 0 25px rgba(168,85,247,0.4);
    }

    .profile-pic {
      width:110px;
      height:110px;
      border-radius:50%;
      border:3px solid #a855f7;
      box-shadow:0 0 20px #a855f7;
      margin-bottom:10px;
    }

    h1 { color:#c084fc; margin-bottom:15px; }

    .link, .copy-box {
      display:block;
      margin:12px auto;
      padding:14px;
      width:260px;
      border-radius:14px;
      background:rgba(40,0,70,0.6);
      border:1px solid #a855f7;
      color:white;
      cursor:pointer;
      text-decoration:none;
    }

    .counter {
      margin-top:10px;
      opacity:0.8;
      font-size:14px;
    }

    .copied {
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      background:#a855f7;
      padding:10px 20px;
      border-radius:10px;
      opacity:0;
    }

    .copied.show {
      animation: pop 1.2s forwards;
    }

    @keyframes pop {
      0%{opacity:0; transform:translate(-50%,20px)}
      20%{opacity:1; transform:translate(-50%,0)}
      100%{opacity:0}
    }
  </style>
</head>

<body>

<div class="container">

  <img class="profile-pic" src="pfp.jpg">
  <h1>@zci8</h1>

  <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
  <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord</a>

  <div class="copy-box" onclick="copyText()">
    🎮 Ubisoft Connect: zci8
  </div>

  <!-- SAFE COUNTER (fallback display) -->
  <div class="counter" id="views">👀 Views: loading...</div>

  <div style="font-size:12px; opacity:0.6; margin-top:8px;">
    made by zci8
  </div>

</div>

<div id="copied" class="copied">Copied!</div>

<script>
function copyText() {
  navigator.clipboard.writeText('zci8');
  const popup = document.getElementById('copied');
  popup.classList.remove('show');
  void popup.offsetWidth;
  popup.classList.add('show');
}
</script>

<!-- REAL GOATCOUNTER (correct + simple) -->
<script data-goatcounter="https://zci8.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>

<!-- fallback fake counter (so it NEVER looks broken) -->
<script>
let fake = Math.floor(Math.random() * 50) + 1;
document.getElementById("views").innerText = "👀 Views: " + fake + " (live pending)";
</script>

</body>
</html>

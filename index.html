<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zci8</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 3.5s ease forwards;
  animation-delay: 2.5s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

.intro-text {
  color: red;
  font-size: 28px;
  letter-spacing: 4px;
  text-shadow: 0 0 15px red;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  25% { transform: translate(-2px, 2px); }
  50% { transform: translate(2px, -2px); }
  75% { transform: translate(-1px, 1px); }
  100% { transform: translate(0); }
}

/* BACKGROUND */
body {
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a0000, black);
  overflow: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #2a0000, black);
  animation: pulse 5s infinite alternate;
  z-index: -1;
}

@keyframes pulse {
  from { filter: brightness(0.7); }
  to { filter: brightness(1.3); }
}

/* MAIN */
.container {
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: rgba(10,0,0,0.6);
  box-shadow: 0 0 30px red;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.profile-pic {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid red;
  box-shadow: 0 0 20px red;
}

h1 {
  margin-top: 10px;
  color: #ff2a2a;
  text-shadow: 0 0 10px red;
}

/* LINKS */
.link, .copy-box {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 260px;
  border-radius: 12px;
  background: rgba(40,0,0,0.6);
  border: 1px solid red;
  color: white;
  cursor: pointer;
  text-decoration: none;
  transition: 0.2s;
}

.link:hover, .copy-box:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* COPIED POPUP */
.copied {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
}

.copied.show {
  animation: pop 1s forwards;
}

@keyframes pop {
  0% { opacity: 0; transform: translate(-50%,20px); }
  20% { opacity: 1; transform: translate(-50%,0); }
  100% { opacity: 0; }
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-text">SYSTEM BOOTING...</div>
</div>

<div class="bg"></div>

<div class="container">

  <img class="profile-pic" src="pfp.jpg">
  <h1>@zci8</h1>

  <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
  <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord</a>

  <div class="copy-box" onclick="copyText()">
    🎮 Ubisoft Connect: zci8
  </div>

  <div style="margin-top:10px; font-size:12px; opacity:0.6;">
    made by zci8
  </div>

</div>

<div id="copied" class="copied">Copied!</div>

<script>
function copyText() {
  navigator.clipboard.writeText('zci8');

  const popup = document.getElementById('copied');
  popup.classList.remove('show');
  void popup.offsetWidth;
  popup.classList.add('show');
}
</script>

</body>
</html>

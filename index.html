<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zci8</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a0000, black);
}

.container {
  text-align: center;
  padding: 30px;
  border-radius: 20px;
  background: rgba(10,0,0,0.6);
  box-shadow: 0 0 30px red;
  width: 340px;
}

.profile-pic {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid red;
  box-shadow: 0 0 20px red;
}

h1 {
  margin-top: 10px;
  color: #ff2a2a;
  text-shadow: 0 0 10px red;
}

.link {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 260px;
  border-radius: 12px;
  background: rgba(40,0,0,0.6);
  border: 1px solid red;
  color: white;
  text-decoration: none;
  transition: 0.2s;
}

.link:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* spotify embed */
.spotify {
  margin-top: 15px;
  border-radius: 12px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="container">

  <img class="profile-pic" src="pfp.jpg">
  <h1>@zci8</h1>

  <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
  <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord</a>

  <div class="link">🎮 Ubisoft Connect: zci8</div>

  <!-- 🎧 SPOTIFY PLAYER -->
  <div class="spotify">
    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/track/7aMOurgDB-o"
      width="300"
      height="80"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>zci8</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(-45deg, #0a001a, #1a0033, #000000, #2a0055);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      background: rgba(20, 0, 40, 0.35);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-pic {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #a855f7;
      box-shadow: 0 0 20px #a855f7;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 32px;
      color: #c084fc;
      text-shadow: 0 0 10px #a855f7;
      margin-bottom: 20px;
    }

    .link {
      display: block;
      margin: 12px auto;
      padding: 14px 18px;
      width: 260px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      background: rgba(40, 0, 70, 0.6);
      border: 1px solid rgba(168, 85, 247, 0.6);
      box-shadow: 0 0 10px rgba(126, 34, 206, 0.4);
      transition: 0.25s ease;
    }

    .link:hover {
      transform: scale(1.06);
      box-shadow: 0 0 20px #a855f7, 0 0 40px #7e22ce;
    }

    .copy-box {
      display: block;
      margin: 12px auto;
      padding: 14px 18px;
      width: 260px;
      border-radius: 14px;
      background: rgba(40, 0, 70, 0.6);
      border: 1px solid rgba(168, 85, 247, 0.6);
      box-shadow: 0 0 10px rgba(126, 34, 206, 0.4);
      cursor: pointer;
      transition: 0.25s ease;
    }

    .copy-box:hover {
      transform: scale(1.06);
      box-shadow: 0 0 20px #a855f7, 0 0 40px #7e22ce;
    }

    .copied {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(168, 85, 247, 0.9);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      box-shadow: 0 0 20px #a855f7;
      opacity: 0;
      pointer-events: none;
    }

    .copied.show {
      animation: pop 1.2s ease forwards;
    }

    @keyframes pop {
      0% { opacity: 0; transform: translate(-50%, 20px); }
      20% { opacity: 1; transform: translate(-50%, 0); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -10px); }
    }

    .footer {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }

    @media (max-width: 500px) {
      .link, .copy-box {
        width: 220px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img class="profile-pic" src="pfp.jpg" alt="Profile Picture">

    <h1>@zci8</h1>

    <a class="link" href="https://www.tiktok.com/@zci8.r6" target="_blank">🎵 TikTok</a>
    <a class="link" href="https://discord.com/invite/zci8" target="_blank">💬 Discord Server</a>

    <div class="copy-box" onclick="copyText()">
      🎮 Ubisoft Connect: zci8
    </div>

    <div class="footer" id="views">Loading views...</div>
    <div class="footer">made by zci8</div>

  </div>

  <div id="copied" class="copied">Copied!</div>

  <script>
    function copyText() {
      navigator.clipboard.writeText('zci8');

      const popup = document.getElementById('copied');
      popup.classList.remove('show');
      void popup.offsetWidth;
      popup.classList.add('show');
    }

    // View counter (FIXED)
    fetch('https://api.countapi.xyz/hit/zci8-site/views')
      .then(res => res.json())
      .then(res => {
        document.getElementById('views').innerText = "👀 Views: " + res.value;
      })
      .catch(() => {
        document.getElementById('views').innerText = "👀 Views unavailable";
      });
  </script>

</body>
</html>
